<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>大鱼吃小鱼</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="game-shell" aria-label="大鱼吃小鱼游戏">
      <section class="topbar">
        <div>
          <p class="eyebrow">Classic Arcade · Multiplayer</p>
          <h1>大鱼吃小鱼</h1>
        </div>
        <div class="stats" aria-label="游戏状态">
          <div>
            <span>分数</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>体型</span>
            <strong id="size">1.0x</strong>
          </div>
          <div>
            <span>连击</span>
            <strong id="combo">0</strong>
          </div>
          <div>
            <span>排名</span>
            <strong id="rank">-</strong>
          </div>
        </div>
      </section>

      <section class="play-area">
        <section class="stage-wrap">
          <canvas id="game" width="1280" height="720" aria-label="游戏画布"></canvas>
          <div class="hud">
            <button id="pauseBtn" type="button" aria-label="暂停或继续">暂停</button>
            <button id="restartBtn" type="button" aria-label="重新开始">重开</button>
          </div>
          <div id="overlay" class="overlay">
            <div>
              <p id="overlayKicker">准备开始</p>
              <h2 id="overlayTitle">吃掉更小的鱼，躲开更大的鱼</h2>
              <p id="overlayText">蓝色发光皇冠鱼就是你。移动鼠标、拖动屏幕，或使用方向键/WASD 控制。长大后可以吞下更大的猎物。</p>
              <div id="roundRanking" class="round-ranking hidden" aria-live="polite"></div>
              <button id="startBtn" type="button">开始游戏</button>
            </div>
          </div>
        </section>

        <aside class="leaderboard" aria-label="多人排行榜">
          <div class="board-head">
            <div>
              <p class="eyebrow">Live Scores</p>
              <h2>实时分数</h2>
            </div>
            <span id="connectionStatus">连接中</span>
          </div>
          <div class="player-chip">
            <span>你的玩家</span>
            <strong id="playerId">识别中</strong>
          </div>
          <ol id="leaderboardList" class="rank-list">
            <li class="empty-rank">等待玩家加入</li>
          </ol>
        </aside>
      </section>

      <section class="controls" aria-label="控制说明">
        <span>鼠标 / 触控：跟随指针</span>
        <span>键盘：WASD 或方向键</span>
        <span>空格：暂停</span>
      </section>
    </main>

    <script src="./game.js?v=202604292015"></script>
  </body>
</html>
